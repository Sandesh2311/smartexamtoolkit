<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExamForge Pro</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#38bdf8',
                        secondary: '#818cf8',
                        dark: '#020617'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-gray-100 min-h-screen">
    <custom-navbar>
        <nav id="fallback-nav" aria-hidden="false" style="display:flex;gap:1rem;padding:0.75rem 1rem;background:rgba(2,6,23,0.95);color:#fff;border-bottom:1px solid rgba(255,255,255,0.04);">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html" class="bg-primary text-dark px-3 py-1 rounded">Sign Up</a>
        </nav>
    </custom-navbar>
    <main class="container mx-auto px-4 py-12 flex items-center justify-center">
        <div class="glass-card p-8 rounded-xl w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold mb-2">Welcome back</h1>
                <p class="text-gray-300">Login to your ExamForge account</p>
            </div>
            
            <form id="login-form" method="POST" onsubmit="return validateForm(this)">
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" id="email" name="email" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="you@example.com" required>
                </div>
                
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="password" name="password" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="••••••••" required>
                </div>
                
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" name="remember" class="h-4 w-4 text-primary focus:ring-primary border-gray-600 rounded">
                        <label for="remember" class="ml-2 text-sm">Remember me</label>
                    </div>
                    <a href="forgot-password.html" class="text-sm text-primary hover:underline">Forgot password?</a>
                </div>

                <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-dark px-4 py-2 rounded-lg font-medium transition-colors mb-4">Login</button>

                <div class="text-center text-sm text-gray-400">
                    Don't have an account? <a href="register.html" class="text-primary hover:underline">Sign up</a>
                </div>
            </form>
        </div>
    </main>

    <custom-footer></custom-footer>
    
    <script src="/static/js/components/navbar.js"></script>
    <script src="/static/js/components/footer.js"></script>
    <script src="/static/js/script.js"></script>
    <script>feather.replace();</script>
</body>
</html>
