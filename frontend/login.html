<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartExamToolkit</title>
    <meta name="description" content="Login for SmartExamToolkit, the intelligent AI exam preparation platform.">
    <meta name="keywords" content="AI exam tool, online exam generator, notes generator, PDF generation, SmartExamToolkit">
    <meta name="author" content="AshX Labs">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://smartexamtoolkit.in/login.html">
    <link rel="icon" type="image/svg+xml" href="./static/favicon.svg">
    <meta property="og:title" content="Login - SmartExamToolkit" />
    <meta property="og:description" content="Login for SmartExamToolkit, the intelligent AI exam preparation platform." />
    <meta property="og:image" content="https://smartexamtoolkit.in/img/logo.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://smartexamtoolkit.in/login.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Login - SmartExamToolkit" />
    <meta name="twitter:description" content="Login for SmartExamToolkit, the intelligent AI exam preparation platform." />
    <meta name="twitter:image" content="https://smartexamtoolkit.in/img/logo.png" />
    <link rel="stylesheet" href="./static/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#8b5cf6',
                        secondary: '#60a5fa',
                        dark: '#020617'
                    }
                }
            }
        }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Login - SmartExamToolkit",
      "description": "Login for SmartExamToolkit, the intelligent AI exam preparation platform.",
      "url": "https://smartexamtoolkit.in/login.html"
    }
    </script>
</head>
<body class="bg-dark text-gray-100 min-h-screen">
    <custom-navbar>
        <nav id="fallback-nav" aria-hidden="false" class="fallback-nav">
            <a href="index.html" class="nav-logo">SmartExamToolkit</a>
            <div class="fallback-links">
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
                <a href="register.html" class="cta-link">Sign Up</a>
            </div>
        </nav>
    </custom-navbar>
    <main class="container mx-auto px-4 py-12 flex items-center justify-center min-h-[calc(100vh-160px)]">
        <div class="glass-card auth-panel p-10 rounded-[2rem] w-full max-w-md border border-white/10">
            <div class="text-center mb-8">
                <p class="eyebrow">Welcome back</p>
                <h1 class="text-3xl font-bold mb-2">Login to SmartExamToolkit</h1>
                <p class="text-gray-400">Secure access to AI-powered exam tools.</p>
            </div>
            
            <form id="login-form" method="POST" onsubmit="return validateForm(this)">
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" id="email" name="email" class="w-full bg-[#081023] border border-white/10 rounded-[1.25rem] px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="you@example.com" required>
                </div>
                
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="password" name="password" class="w-full bg-[#081023] border border-white/10 rounded-[1.25rem] px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="••••••••" required>
                </div>
                
                <div class="flex flex-col sm:flex-row items-center justify-between gap-3 mb-4 text-sm text-gray-300">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="remember" name="remember" class="h-4 w-4 text-primary focus:ring-primary border-gray-600 rounded">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="forgot-password.html" class="text-primary hover:underline">Forgot password?</a>
                </div>

                <button type="submit" class="w-full btn-primary py-3 rounded-[1.5rem] font-medium mb-4">Login</button>

                <div class="text-center text-sm text-gray-400">
                    Don't have an account? <a href="register.html" class="text-primary hover:underline">Sign up</a>
                </div>
            </form>
        </div>
    </main>

    <custom-footer></custom-footer>
    
    <script src="./static/js/components/navbar.js"></script>
    <script src="./static/js/components/footer.js"></script>
    <script src="./static/js/script.js"></script>
    <script>feather.replace();</script>
</body>
</html>
