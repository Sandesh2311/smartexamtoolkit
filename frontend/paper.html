<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Generator - ExamForge Pro</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#38bdf8',
                        secondary: '#818cf8',
                        dark: '#020617'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-gray-100 min-h-screen">
    <custom-navbar>
        <nav id="fallback-nav" aria-hidden="false" style="display:flex;gap:1rem;padding:0.75rem 1rem;background:rgba(2,6,23,0.95);color:#fff;border-bottom:1px solid rgba(255,255,255,0.04);">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html" class="bg-primary text-dark px-3 py-1 rounded">Sign Up</a>
        </nav>
    </custom-navbar>
    
    <main class="container mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold">Paper Generator</h1>
                <p class="text-gray-300">Create complete exam papers with your pattern</p>
            </div>
            <div class="mt-4 md:mt-0">
                <button id="generate-btn" class="bg-primary hover:bg-primary/90 text-dark px-6 py-2 rounded-lg font-medium transition-colors flex items-center">
                    <i data-feather="zap" class="w-4 h-4 mr-2"></i>
                    Generate
                </button>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-1">
                <div class="glass-card p-6 rounded-xl sticky top-4">
                    <h2 class="text-xl font-bold mb-4">Configuration</h2>
                    
                    <form id="paper-form">
                        <div class="mb-4">
                            <label for="subject" class="block text-sm font-medium mb-2">Subject</label>
                            <input type="text" id="subject" name="subject" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g. Mathematics, Biology" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="class" class="block text-sm font-medium mb-2">Class/Grade</label>
                            <input type="text" id="class" name="class" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g. 10th, B.Sc" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="marks" class="block text-sm font-medium mb-2">Total Marks</label>
                            <input type="number" id="marks" name="marks" min="10" max="100" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" value="50" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="duration" class="block text-sm font-medium mb-2">Duration</label>
                            <input type="text" id="duration" name="duration" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g. 2 hours" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="pattern" class="block text-sm font-medium mb-2">Question Pattern</label>
                            <textarea id="pattern" name="pattern" rows="4" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g. Section A: 5 MCQs (1 mark each)&#10;Section B: 5 short answer (2 marks each)&#10;Section C: 2 long answer (5 marks each)" required></textarea>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Preview Section -->
            <div class="lg:col-span-2">
                <div class="glass-card p-6 rounded-xl mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">Preview</h2>
                        <button id="download-btn" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center disabled:opacity-50" disabled>
                            <i data-feather="download" class="w-4 h-4 mr-2"></i>
                            Download PDF
                        </button>
                    </div>
                    
                    <div id="preview-content" class="space-y-6">
                        <div class="text-center py-12 text-gray-400">
                            <i data-feather="file-text" class="w-12 h-12 mx-auto mb-4"></i>
                            <p>Your generated exam paper will appear here</p>
                        </div>
                    </div>
                </div>
                
                <!-- Premium CTA -->
                <div class="glass-card p-6 rounded-xl bg-gradient-to-r from-primary/10 to-secondary/10 border border-primary/20">
                    <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                        <div>
                            <h3 class="text-lg font-semibold mb-1">Unlock PDF Downloads</h3>
                            <p class="text-gray-300">Upgrade to Premium to download your papers as PDF</p>
                        </div>
                        <a href="premium.html" class="bg-primary hover:bg-primary/90 text-dark px-6 py-2 rounded-lg font-medium transition-colors whitespace-nowrap">
                            Upgrade Now
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <custom-footer></custom-footer>
    
    <script src="/static/js/components/navbar.js"></script>
    <script src="/static/js/components/footer.js"></script>
    <script src="/static/js/script.js"></script>
    <script>
        // Sample paper generation logic
        document.getElementById('generate-btn').addEventListener('click', function() {
            const subject = document.getElementById('subject').value || 'Mathematics';
            const className = document.getElementById('class').value || '10th';
            const marks = document.getElementById('marks').value;
            const duration = document.getElementById('duration').value || '2 hours';
            const pattern = document.getElementById('pattern').value || 'Section A: 5 MCQs (1 mark each)\nSection B: 5 short answer (2 marks each)\nSection C: 2 long answer (5 marks each)';
            
            // Generate sample paper
            const paper = `
                <div class="border-b border-gray-700 pb-6 mb-6">
                    <div class="text-center mb-6">
                        <h3 class="text-xl font-bold">${className} ${subject} Examination</h3>
                        <p class="text-gray-300">Total Marks: ${marks} | Duration: ${duration}</p>
                    </div>
                    
                    <div class="mb-6">
                        <h4 class="font-semibold mb-2">General Instructions:</h4>
                        <ol class="list-decimal list-inside space-y-1">
                            <li>All questions are compulsory</li>
                            <li>Read the questions carefully before answering</li>
                            <li>Marks are indicated against each question</li>
                        </ol>
                    </div>
                    
                    ${pattern.split('\n').map(section => {
                        const match = section.match(/\d+/);
                        const qCount = match ? parseInt(match[0], 10) : 1;
                        return `
                        <div class="mb-6">
                            <h4 class="font-semibold mb-2">${section}</h4>
                            ${section.includes('MCQ') ? `
                                <div class="ml-4 space-y-4">
                                    ${Array.from({length: qCount}, (_, i) => `
                                        <div>
                                            <p class="mb-2">${i+1}. Sample MCQ question?</p>
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-2 ml-4">
                                                <div>A) Option 1</div>
                                                <div>B) Option 2</div>
                                                <div>C) Option 3</div>
                                                <div>D) Option 4</div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : `
                                <div class="ml-4 space-y-4">
                                    ${Array.from({length: qCount}, (_, i) => `
                                        <div>
                                            <p>${i+1}. Sample ${section.includes('short') ? 'short' : 'long'} answer question?</p>
                                        </div>
                                    `).join('')}
                                </div>
                            `}
                        </div>
                    `}).join('')}
                </div>
            `;
            
            document.getElementById('preview-content').innerHTML = paper;
            document.getElementById('download-btn').disabled = false;
            feather.replace();
        });
        
        document.getElementById('download-btn').addEventListener('click', function() {
            alert('Please upgrade to Premium to download PDFs');
        });
    </script>
    <script>feather.replace();</script>
</body>
</html>
