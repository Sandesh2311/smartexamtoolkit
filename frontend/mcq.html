<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="MCQ Generator for SmartExamToolkit, the intelligent AI exam preparation platform.">
    <meta name="keywords" content="AI exam tool, online exam generator, notes generator, PDF generation, SmartExamToolkit">
    <meta name="author" content="AshX Labs">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://smartexamtoolkit.in/mcq.html">
    <link rel="icon" type="image/svg+xml" href="./static/favicon.svg">
    <meta property="og:title" content="MCQ Generator - SmartExamToolkit" />
    <meta property="og:description" content="MCQ Generator for SmartExamToolkit, the intelligent AI exam preparation platform." />
    <meta property="og:image" content="https://smartexamtoolkit.in/img/logo.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://smartexamtoolkit.in/mcq.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MCQ Generator - SmartExamToolkit" />
    <meta name="twitter:description" content="MCQ Generator for SmartExamToolkit, the intelligent AI exam preparation platform." />
    <meta name="twitter:image" content="https://smartexamtoolkit.in/img/logo.png" />
    <link rel="stylesheet" href="./static/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#8b5cf6',
                        secondary: '#60a5fa',
                        dark: '#020617'
                    }
                }
            }
        }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "MCQ Generator - SmartExamToolkit",
      "description": "MCQ Generator for SmartExamToolkit, the intelligent AI exam preparation platform.",
      "url": "https://smartexamtoolkit.in/mcq.html"
    }
    </script>
</head>
<body class="bg-dark text-gray-100 min-h-screen">
    <custom-navbar>
        <nav id="fallback-nav" aria-hidden="false" style="display:flex;gap:1rem;padding:0.75rem 1rem;background:rgba(2,6,23,0.95);color:#fff;border-bottom:1px solid rgba(255,255,255,0.04);">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html" class="bg-primary text-dark px-3 py-1 rounded">Sign Up</a>
        </nav>
    </custom-navbar>
    
    <main class="container mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold">MCQ Generator</h1>
                <p class="text-gray-300">Generate multiple choice questions instantly</p>
            </div>
            <div class="mt-4 md:mt-0">
                <button id="generate-btn" class="bg-primary hover:bg-primary/90 text-dark px-6 py-2 rounded-lg font-medium transition-colors flex items-center">
                    <i data-feather="zap" class="w-4 h-4 mr-2"></i>
                    Generate
                </button>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-1">
                <div class="glass-card p-6 rounded-xl sticky top-4">
                    <h2 class="text-xl font-bold mb-4">Configuration</h2>
                    
                    <form id="mcq-form">
                        <div class="mb-4">
                            <label for="subject" class="block text-sm font-medium mb-2">Subject</label>
                            <input type="text" id="subject" name="subject" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g. Physics, Chemistry" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="topic" class="block text-sm font-medium mb-2">Topic</label>
                            <input type="text" id="topic" name="topic" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="e.g. Thermodynamics, Organic Chemistry" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="difficulty" class="block text-sm font-medium mb-2">Difficulty</label>
                            <select id="difficulty" name="difficulty" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                                <option value="easy">Easy</option>
                                <option value="medium" selected>Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <label for="count" class="block text-sm font-medium mb-2">Number of Questions</label>
                            <input type="number" id="count" name="count" min="1" max="50" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" value="10" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="language" class="block text-sm font-medium mb-2">Language</label>
                            <select id="language" name="language" class="w-full bg-gray-900/50 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                                <option value="english" selected>English</option>
                                <option value="hindi">Hindi</option>
                                <option value="spanish">Spanish</option>
                                <option value="french">French</option>
                            </select>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Preview Section -->
            <div class="lg:col-span-2">
                <div class="glass-card p-6 rounded-xl mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">Preview</h2>
                        <button id="download-btn" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center disabled:opacity-50" disabled>
                            <i data-feather="download" class="w-4 h-4 mr-2"></i>
                            Download PDF
                        </button>
                    </div>
                    
                    <div id="preview-content" class="space-y-6">
                        <div class="text-center py-12 text-gray-400">
                            <i data-feather="file-text" class="w-12 h-12 mx-auto mb-4"></i>
                            <p>Your generated MCQs will appear here</p>
                        </div>
                    </div>
                </div>
                
                <!-- Premium CTA -->
                <div class="glass-card p-6 rounded-xl bg-gradient-to-r from-primary/10 to-secondary/10 border border-primary/20">
                    <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                        <div>
                            <h3 class="text-lg font-semibold mb-1">Unlock PDF Downloads</h3>
                            <p class="text-gray-300">Upgrade to Premium to download your MCQs as PDF</p>
                        </div>
                        <a href="premium.html" class="bg-primary hover:bg-primary/90 text-dark px-6 py-2 rounded-lg font-medium transition-colors whitespace-nowrap">
                            Upgrade Now
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <custom-footer></custom-footer>
    
    <script src="./static/js/components/navbar.js"></script>
    <script src="./static/js/components/footer.js"></script>
    <script src="./static/js/script.js"></script>
    <script>
        function buildMcqPrompt({ subject, topic, difficulty, count, language }) {
            return [
                `Generate ${count} multiple-choice questions.`,
                `Subject: ${subject}`,
                `Topic: ${topic}`,
                `Difficulty: ${difficulty}`,
                `Language: ${language}`,
                `Return in plain text with numbered questions and options A-D.`,
                `Include the correct answer at the end of each question like "Answer: B".`
            ].join('\\n');
        }

        document.getElementById('generate-btn').addEventListener('click', async function() {
            const subject = document.getElementById('subject').value || 'Physics';
            const topic = document.getElementById('topic').value || 'Thermodynamics';
            const difficulty = document.getElementById('difficulty').value || 'medium';
            const count = parseInt(document.getElementById('count').value, 10) || 10;
            const language = document.getElementById('language').value || 'english';

            const preview = document.getElementById('preview-content');
            const btn = document.getElementById('generate-btn');
            btn.disabled = true;
            btn.textContent = 'Generating...';
            preview.innerHTML = '<p class="text-gray-400">Generating MCQs...</p>';

            try {
                const prompt = buildMcqPrompt({ subject, topic, difficulty, count, language });
                const text = await generateAI(prompt);
                preview.innerHTML = `<pre class="whitespace-pre-wrap text-gray-100">${text}</pre>`;
                document.getElementById('download-btn').disabled = false;
            } catch (e) {
                preview.innerHTML = `<p class="text-red-400">Error generating MCQs: ${e.message || e}</p>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-feather="zap" class="w-4 h-4 mr-2"></i>Generate';
                feather.replace();
            }
        });

        document.getElementById('download-btn').addEventListener('click', async function() {
            const btn = this;
            btn.disabled = true;
            const original = btn.innerHTML;
            btn.textContent = 'Checking...';
            try {
                const data = await consumePdfAllowance();
                if (!data.is_premium && data.remaining === 0) {
                    btn.disabled = true;
                    btn.textContent = 'Free limit used';
                } else {
                    btn.innerHTML = original;
                }
                alert('PDF download will be available here.');
            } catch (e) {
                if (e.status === 401) {
                    if (confirm('You must be logged in to download. Go to login page?')) window.location.href = 'login.html';
                } else {
                    alert(e.message || 'Free PDF limit reached. Please upgrade to Premium.');
                }
                btn.disabled = false;
                btn.innerHTML = original;
                feather.replace();
            }
        });
    </script>
    <script>feather.replace();</script>
</body>
</html>
